# Composite action: when BOTH php8.4-fpm and php8.3-fpm are installed and
# enabled, disable and stop the older php8.3-fpm so only the newer FPM stays
# active. A no-op on hosts where either condition is false.
#
# The `service_status` builtin queries a unit without changing it and publishes
# is_enabled/running/exists as outputs, so the gate is a clean boolean compare
# instead of parsing `systemctl is-enabled` exit codes.
#
name: disable-old-php-fpm
description: Disable+stop php8.3-fpm when php8.4-fpm and php8.3-fpm are both enabled.

runs:
  using: composite
  steps:
    - id: check_new
      name: Is php8.4-fpm installed and enabled?
      uses: service_status
      with:
        name: php8.4-fpm

    - id: check_old
      name: Is php8.3-fpm installed and enabled?
      uses: service_status
      with:
        name: php8.3-fpm

    - id: disable_old
      name: Disable and stop php8.3-fpm
      # Only when BOTH units are enabled (which also implies installed).
      if: >-
        steps.check_new.outputs.is_enabled == 'true' &&
        steps.check_old.outputs.is_enabled == 'true'
      uses: service
      with:
        name: php8.3-fpm
        state: stopped
        enabled: "false"
